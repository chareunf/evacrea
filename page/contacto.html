<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/style.css">
    <title>Contacto</title>
</head>

<body>
    <div class="contacto">
        <header>
            <div>
                <a href="./../index.html" class="header__logo">EvaCreaArte</a>
            </div>
            <nav>
                <ul class="header__nav__items">
                    <li>
                        <a href="./../index.html">Inicio</a>
                    </li>
                    <li>
                        <a href="./quiensoy.html">¿Quien soy?</a>
                    </li>
                    <li>
                        <a href="./peluches.html">Peluches</a>
                    </li>
                    <li>
                        <a href="./novedades.html">Novedades</a>
                    </li>
                    <li>
                        <a href="./contacto.html">Contacto</a>
                    </li>
                </ul>
            </nav>

        </header>

        <main>
            <h1>Contactanos</h1>
            <form action="">


                <div>
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" required name="apellido">
                </div>

                <div>
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" required name="nombre">
                </div>

                <div>
                    <label for="telefono">Telefono</label>
                    <input type="tel" id="telefono">
                </div>
                <div>
                    <label for="sexo">Sexo</label>
                    <select id="sexo">
                        <option value="masculino">Masculino</option>
                        <option value="femenino">Femenino</option>

                    </select>
                </div>
                <fieldset>
                    <legend>Correo electronico</legend>

                    <div>
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="micorreo@micorreo.com">
                    </div>
                </fieldset>

                <div>
                    <label for="mensaje">Mensaje</label>
                    <textarea name="mensaje" id="mensaje" cols="30" rows="10"
                        placeholder="Escribe tu mensaje aqui"></textarea>

                </div>

                <div>
                    <input type="reset" id="botonlimpiar" value="Limpiar campos">
                    <input type="submit" id="enviodedatos" value="enviar">
                </div>
                <div>
                    <label for="newslatter">¿Desea recibir mas informacion?</label>
                    <input type="checkbox">
                </div>


            </form>

            <div>
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d26289.133609619283!2d-58.580314817823265!3d-34.5499674502807!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95bcb9f880d30623%3A0xf63bd5e2b5393d70!2sVilla%20Ballester%2C%20Provincia%20de%20Buenos%20Aires!5e0!3m2!1ses!2sar!4v1647713885250!5m2!1ses!2sar"
                    width="400" height="250" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>

        </main>

        <footer>

            <div>
                <ul>
                    <li>
                        <a href="https://www.facebook.com/creaelige" target="_blank">
                            <img src="./../assets/img/facebook.png" alt="iconofacebook" width="20px" height="20px">
                        </a>
                    </li>
                    <li>
                        <a href="instagram" target="_blank">
                            <img src="./../assets/img/instagram.png" alt="iconoinstagram" width="20px" height="20px">
                        </a>
                    </li>
                    <li>
                        <a href="whatsapp" target="_blank">
                            <img src="./../assets/img/whatsapp.png" alt="iconowhatsapp" width="20px" height="20px">
                        </a>
                    </li>
                </ul>
            </div>

        </footer>
    </div>
</body>

</html>
